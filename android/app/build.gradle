plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def resolvedGoogleMapsApiKey = {
    def p = project.findProperty("googleMapsApiKey") as String
    if (p != null && !p.trim().isEmpty()) return p.trim()
    def e = System.getenv("GOOGLE_MAPS_API_KEY")
    if (e != null && !e.trim().isEmpty()) return e.trim()
    return ""
}()

def resolvedAuth0Domain = {
    def p = project.findProperty("auth0Domain") as String
    if (p != null && !p.trim().isEmpty()) return p.trim()
    def e = System.getenv("AUTH0_DOMAIN")
    if (e != null && !e.trim().isEmpty()) return e.trim()
    return "dev-cpd6arma80386i5r.us.auth0.com"
}()

android {
    namespace = "com.dotdash.projectbrain"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile rootProject.file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    defaultConfig {
        applicationId = "com.dotdash.projectbrain"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled = true
        manifestPlaceholders = [
            appAuthRedirectScheme: "com.dotdash.projectbrain",
            auth0Domain            : resolvedAuth0Domain,
            auth0Scheme            : "https",
            googleMapsApiKey       : resolvedGoogleMapsApiKey,
        ]
    }

    buildTypes {
        release {
            signingConfig = hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

flutter {
    source = "../.."
}
